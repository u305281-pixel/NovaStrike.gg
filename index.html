
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA REAPERS Ultimate</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>
<body>

<nav class="navbar">
    <h2>NOVA REAPERS</h2>
    <div>
        <button onclick="toggleDarkMode()" class="btn-small">🌙</button>
        <button onclick="fakeLogin()" class="btn-small">Login</button>
    </div>
</nav>

<header class="hero">
    <h1>Türkiye PUBG Platformu</h1>
    <p>Oyuncu Gelişimi • Lig Sistemi • Performans Analizi</p>
</header>

<section class="section">
    <h2>Oyuncu Yönetimi</h2>
    <input type="text" id="playerName" placeholder="Oyuncu Adı">
    <input type="number" id="playerScore" placeholder="Skor">
    <button onclick="addPlayer()" class="btn">Oyuncu Ekle</button>
    <ul id="playerList"></ul>
</section>

<section class="section">
    <h2>Lig Yönetimi</h2>
    <input type="text" id="leagueName" placeholder="Lig Adı">
    <button onclick="addLeague()" class="btn">Lig Oluştur</button>
    <ul id="leagueList"></ul>
</section>

<section class="section">
    <h2>Performans Grafik</h2>
    <canvas id="chart" width="400" height="200"></canvas>
    <button onclick="generateChart()" class="btn">Grafik Yenile</button>
</section>

<section class="section">
    <h2>Leaderboard</h2>
    <ol id="leaderboard"></ol>
</section>

<footer>
    <p>© 2026 NOVA REAPERS Ultimate</p>
</footer>

</body>
</html>
