<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NovaStrike.gg | SUPER PRO</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>NovaStrike.gg SUPER PRO</h1>
<nav>
<button onclick="show('home')">Ana</button>
<button onclick="show('players')">Oyuncular</button>
<button onclick="show('tournament')">Turnuva</button>
<button onclick="show('score')">Skor</button>
<button onclick="show('admin')">Admin</button>
</nav>
</header>

<section id="home">
<h2>🚀 Sistem Aktif</h2>
<p>Profesyonel e-spor platformu.</p>
</section>

<section id="players" style="display:none;">
<h2>👤 Oyuncu Profilleri</h2>
<input id="playerName" placeholder="Oyuncu Adı">
<input id="playerRole" placeholder="Rol">
<button onclick="addPlayer()">Profil Ekle</button>
<div id="playerList"></div>
</section>

<section id="tournament" style="display:none;">
<h2>🏆 Turnuva Bracket</h2>
<input id="tourName" placeholder="Turnuva Adı">
<button onclick="addTournament()">Turnuva Oluştur</button>
<div id="tourList"></div>
</section>

<section id="score" style="display:none;">
<h2>📊 Canlı Skor</h2>
<input id="team1" placeholder="Takım 1">
<input id="team2" placeholder="Takım 2">
<input id="score1" type="number" placeholder="Skor 1">
<input id="score2" type="number" placeholder="Skor 2">
<button onclick="addMatch()">Skor Güncelle</button>
<div id="scoreList"></div>
</section>

<section id="admin" style="display:none;">
<h2>🔐 Admin</h2>
<input id="adminPass" type="password" placeholder="Şifre">
<button onclick="login()">Giriş</button>
<div id="adminPanel" style="display:none;">
<p>Admin Yetkili ✅</p>
</div>
</section>

<script src="app.js"></script>
</body>
</html>
